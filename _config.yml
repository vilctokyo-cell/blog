title: 現場からは以上です！
description: ライブ参戦・推し活のフィクション体験談を毎日お届け。缶バッジ、痛バッグ、参戦服、ペンライトの海……オタクたちの熱くて笑えてちょっと泣ける物語。
lang: ja
url: "https://blog.vilc.tokyo"
baseurl: ""
timezone: Asia/Tokyo

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: true

paginate: 10
paginate_path: "/page/:num/"
permalink: /stories/:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - scripts/
  - README.md
